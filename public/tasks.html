<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeployWatch — Task Manager</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080c10;
    --bg2: #0d1117;
    --bg3: #161b22;
    --border: #21262d;
    --green: #39d353;
    --yellow: #f0c53f;
    --red: #f85149;
    --blue: #58a6ff;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --text-muted: #484f58;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'JetBrains Mono', monospace; min-height: 100vh;
  }
  body::before {
    content:''; position:fixed; inset:0;
    background-image:
      linear-gradient(rgba(57,211,83,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(57,211,83,0.03) 1px, transparent 1px);
    background-size:40px 40px; pointer-events:none; z-index:0;
  }
  .container { position:relative; z-index:1; max-width:900px; margin:0 auto; padding:24px; }

  /* Header & Nav */
  header { display:flex; align-items:center; justify-content:space-between; margin-bottom:32px; padding-bottom:20px; border-bottom:1px solid var(--border); }
  .header-left { display:flex; align-items:center; gap:24px; }
  .logo { display:flex; align-items:center; gap:12px; text-decoration:none; }
  .logo-icon { width:36px; height:36px; background:var(--green); border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:18px; }
  .logo-text { font-family:'Syne',sans-serif; font-size:20px; font-weight:800; color:var(--text); }
  .logo-text span { color:var(--green); }
  .nav { display:flex; gap:4px; }
  .nav a {
    padding:6px 14px; border-radius:6px; font-size:12px; text-decoration:none;
    color:var(--text-dim); border:1px solid transparent; transition:all 0.2s;
  }
  .nav a:hover { color:var(--text); background:var(--bg3); }
  .nav a.active { color:var(--green); border-color:rgba(57,211,83,0.3); background:rgba(57,211,83,0.08); }
  .timestamp { font-size:11px; color:var(--text-muted); }

  /* Stats */
  .stats { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:24px; }
  .stat-card { background:var(--bg2); border:1px solid var(--border); border-radius:10px; padding:16px 20px; }
  .stat-card .s-label { font-size:10px; text-transform:uppercase; letter-spacing:1.5px; color:var(--text-muted); margin-bottom:8px; }
  .stat-card .s-value { font-family:'Syne',sans-serif; font-size:28px; font-weight:800; }
  @media(max-width:600px) { .stats { grid-template-columns:repeat(2,1fr); } }

  /* Add form */
  .add-form { background:var(--bg2); border:1px solid var(--border); border-radius:10px; padding:20px; margin-bottom:24px; }
  .form-label { font-size:11px; text-transform:uppercase; letter-spacing:1.5px; color:var(--text-muted); margin-bottom:14px; }
  .form-row { display:flex; gap:10px; }
  .form-input {
    flex:1; background:var(--bg3); border:1px solid var(--border); border-radius:6px;
    padding:10px 14px; color:var(--text); font-family:'JetBrains Mono',monospace; font-size:13px;
    outline:none; transition:border-color 0.2s;
  }
  .form-input:focus { border-color:rgba(57,211,83,0.4); }
  .form-input::placeholder { color:var(--text-muted); }
  .form-select {
    background:var(--bg3); border:1px solid var(--border); border-radius:6px;
    padding:10px 14px; color:var(--text); font-family:'JetBrains Mono',monospace; font-size:12px;
    outline:none; cursor:pointer; min-width:120px;
  }
  .btn-add {
    background:var(--green); color:#000; border:none; border-radius:6px;
    padding:10px 20px; font-family:'Syne',sans-serif; font-weight:700; font-size:13px;
    cursor:pointer; transition:opacity 0.2s; white-space:nowrap;
  }
  .btn-add:hover { opacity:0.85; }
  .btn-add:disabled { opacity:0.4; cursor:not-allowed; }

  /* Filters */
  .filters { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; }
  .filter-btn {
    padding:6px 16px; border-radius:20px; font-size:11px; cursor:pointer;
    border:1px solid var(--border); background:transparent; color:var(--text-dim);
    font-family:'JetBrains Mono',monospace; transition:all 0.2s;
  }
  .filter-btn.active { background:rgba(57,211,83,0.1); border-color:rgba(57,211,83,0.3); color:var(--green); }
  .filter-btn:hover:not(.active) { border-color:#30363d; color:var(--text); }

  /* Task list */
  .task-list { display:flex; flex-direction:column; gap:8px; }
  .task-item {
    background:var(--bg2); border:1px solid var(--border); border-radius:8px;
    padding:14px 16px; display:flex; align-items:center; gap:12px;
    transition:border-color 0.2s, opacity 0.3s;
  }
  .task-item:hover { border-color:#30363d; }
  .task-item.done { opacity:0.5; }
  .task-item.done .task-title { text-decoration:line-through; color:var(--text-muted); }

  .task-check {
    width:20px; height:20px; border-radius:4px; border:2px solid var(--border);
    background:transparent; cursor:pointer; display:flex; align-items:center; justify-content:center;
    flex-shrink:0; transition:all 0.2s; font-size:11px; font-weight:700; color:#000;
  }
  .task-check:hover { border-color:var(--green); }
  .task-check.checked { background:var(--green); border-color:var(--green); }

  .task-body { flex:1; min-width:0; }
  .task-title { font-size:13px; color:var(--text); margin-bottom:3px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .task-meta { font-size:10px; color:var(--text-muted); }

  .priority-badge { font-size:10px; padding:2px 8px; border-radius:20px; text-transform:uppercase; letter-spacing:0.5px; flex-shrink:0; }
  .priority-high   { background:rgba(248,81,73,0.15);  color:var(--red); }
  .priority-medium { background:rgba(240,197,63,0.15); color:var(--yellow); }
  .priority-low    { background:rgba(57,211,83,0.15);  color:var(--green); }

  .btn-delete {
    background:transparent; border:1px solid transparent; border-radius:6px;
    color:var(--text-muted); cursor:pointer; padding:4px 8px; font-size:13px;
    transition:all 0.2s; flex-shrink:0;
  }
  .btn-delete:hover { color:var(--red); border-color:rgba(248,81,73,0.3); background:rgba(248,81,73,0.08); }

  .empty { text-align:center; padding:48px; color:var(--text-muted); font-size:13px; }
  .empty-icon { font-size:32px; margin-bottom:12px; }

  footer { margin-top:32px; padding-top:16px; border-top:1px solid var(--border); display:flex; justify-content:space-between; font-size:11px; color:var(--text-muted); }
  @media(max-width:500px) { .form-row { flex-direction:column; } }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="header-left">
      <a href="/" class="logo">
        <div class="logo-icon">🚀</div>
        <div class="logo-text">Deploy<span>Watch</span></div>
      </a>
      <nav class="nav">
        <a href="/">Dashboard</a>
        <a href="/tasks" class="active">Task Manager</a>
      </nav>
    </div>
    <div class="timestamp" id="clock">--:--:--</div>
  </header>

  <!-- Stats -->
  <div class="stats">
    <div class="stat-card">
      <div class="s-label">Нийт</div>
      <div class="s-value" id="stat-total">0</div>
    </div>
    <div class="stat-card">
      <div class="s-label">Дууссан</div>
      <div class="s-value" id="stat-done" style="color:var(--green)">0</div>
    </div>
    <div class="stat-card">
      <div class="s-label">Хүлээгдэж буй</div>
      <div class="s-value" id="stat-pending" style="color:var(--yellow)">0</div>
    </div>
    <div class="stat-card">
      <div class="s-label">Яаралтай</div>
      <div class="s-value" id="stat-high" style="color:var(--red)">0</div>
    </div>
  </div>

  <!-- Add task form -->
  <div class="add-form">
    <div class="form-label">Шинэ даалгавар нэмэх</div>
    <div class="form-row">
      <input
        type="text"
        class="form-input"
        id="task-input"
        placeholder="Даалгаврын нэр оруулна уу..."
        maxlength="200"
      >
      <select class="form-select" id="priority-select">
        <option value="high">Яаралтай</option>
        <option value="medium" selected>Дунд</option>
        <option value="low">Бага</option>
      </select>
      <button class="btn-add" id="add-btn" onclick="addTask()">+ Нэмэх</button>
    </div>
  </div>

  <!-- Filters -->
  <div class="filters">
    <button class="filter-btn active" data-filter="all"     onclick="setFilter('all', this)">Бүгд (<span id="count-all">0</span>)</button>
    <button class="filter-btn"        data-filter="pending" onclick="setFilter('pending', this)">Хүлээгдэж буй (<span id="count-pending">0</span>)</button>
    <button class="filter-btn"        data-filter="done"    onclick="setFilter('done', this)">Дууссан (<span id="count-done">0</span>)</button>
  </div>

  <!-- Task list -->
  <div class="task-list" id="task-list">
    <div class="empty"><div class="empty-icon">📋</div>Уншиж байна...</div>
  </div>

  <footer>
    <span>DeployWatch · Task Manager · Docker + Jenkins CI/CD</span>
    <span id="footer-time"></span>
  </footer>
</div>

<script>
  let tasks  = [];
  let filter = 'all';

  // Clock
  function tick() {
    const now = new Date();
    document.getElementById('clock').textContent = now.toLocaleTimeString('en-US', {hour12: false});
    document.getElementById('footer-time').textContent = now.toLocaleString('mn-MN');
  }
  setInterval(tick, 1000); tick();

  // Load tasks from API
  async function loadTasks() {
    try {
      const r = await fetch('/api/tasks');
      tasks = await r.json();
    } catch (e) {
      tasks = [];
    }
    render();
  }

  // Render task list + stats
  function render() {
    const total   = tasks.length;
    const done    = tasks.filter(t => t.done).length;
    const pending = tasks.filter(t => !t.done).length;
    const high    = tasks.filter(t => t.priority === 'high' && !t.done).length;

    document.getElementById('stat-total').textContent   = total;
    document.getElementById('stat-done').textContent    = done;
    document.getElementById('stat-pending').textContent = pending;
    document.getElementById('stat-high').textContent    = high;
    document.getElementById('count-all').textContent     = total;
    document.getElementById('count-pending').textContent = pending;
    document.getElementById('count-done').textContent    = done;

    const filtered =
      filter === 'done'    ? tasks.filter(t => t.done) :
      filter === 'pending' ? tasks.filter(t => !t.done) :
      tasks;

    const list = document.getElementById('task-list');
    if (!filtered.length) {
      list.innerHTML = '<div class="empty"><div class="empty-icon">📋</div>Даалгавар байхгүй байна</div>';
      return;
    }

    const priorityLabel = { high: 'Яаралтай', medium: 'Дунд', low: 'Бага' };
    list.innerHTML = filtered.map(t => `
      <div class="task-item${t.done ? ' done' : ''}" id="task-${t.id}">
        <div class="task-check${t.done ? ' checked' : ''}" onclick="toggleTask(${t.id})">
          ${t.done ? '✓' : ''}
        </div>
        <div class="task-body">
          <div class="task-title">${escHtml(t.title)}</div>
          <div class="task-meta">${new Date(t.createdAt).toLocaleDateString('mn-MN')}</div>
        </div>
        <span class="priority-badge priority-${t.priority}">${priorityLabel[t.priority] || t.priority}</span>
        <button class="btn-delete" onclick="deleteTask(${t.id})" title="Устгах">✕</button>
      </div>
    `).join('');
  }

  function setFilter(f, btn) {
    filter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  async function addTask() {
    const input = document.getElementById('task-input');
    const title = input.value.trim();
    if (!title) { input.focus(); return; }
    const priority = document.getElementById('priority-select').value;
    const btn = document.getElementById('add-btn');
    btn.disabled = true;
    try {
      const r = await fetch('/api/tasks', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ title, priority }),
      });
      if (r.ok) {
        const task = await r.json();
        tasks.push(task);
        input.value = '';
        render();
      }
    } finally {
      btn.disabled = false;
      input.focus();
    }
  }

  async function toggleTask(id) {
    const task = tasks.find(t => t.id === id);
    if (!task) return;
    const r = await fetch(`/api/tasks/${id}`, {
      method:  'PUT',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ done: !task.done }),
    });
    if (r.ok) {
      task.done = !task.done;
      render();
    }
  }

  async function deleteTask(id) {
    const r = await fetch(`/api/tasks/${id}`, { method: 'DELETE' });
    if (r.ok) {
      tasks = tasks.filter(t => t.id !== id);
      render();
    }
  }

  function escHtml(s) {
    return s
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // Enter key to add
  document.getElementById('task-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTask();
  });

  loadTasks();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeployWatch — Task Manager</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:   #060a0e;
    --bg2:  #0d1117;
    --bg3:  #161b22;
    --bg4:  #1c2128;
    --border:#21262d;
    --green: #3fb950;
    --green2:#39d353;
    --yellow:#e3b341;
    --red:   #f85149;
    --blue:  #58a6ff;
    --text:  #e6edf3;
    --text-dim:#8b949e;
    --text-muted:#484f58;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;min-height:100vh;}
  body::before{
    content:'';position:fixed;inset:0;
    background-image:
      linear-gradient(rgba(63,185,80,0.04) 1px,transparent 1px),
      linear-gradient(90deg,rgba(63,185,80,0.04) 1px,transparent 1px);
    background-size:48px 48px;pointer-events:none;z-index:0;
  }
  body::after{
    content:'';position:fixed;top:-120px;left:50%;transform:translateX(-50%);
    width:500px;height:200px;
    background:radial-gradient(ellipse,rgba(63,185,80,0.1) 0%,transparent 70%);
    pointer-events:none;z-index:0;
  }
  .container{position:relative;z-index:1;max-width:820px;margin:0 auto;padding:24px 28px;}

  /* Header */
  header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid var(--border);}
  .header-left{display:flex;align-items:center;gap:28px;}
  .logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
  .logo-icon{
    width:34px;height:34px;border-radius:8px;
    background:linear-gradient(135deg,#3fb950,#1a7f37);
    display:flex;align-items:center;justify-content:center;
    font-family:'Syne',sans-serif;font-size:13px;font-weight:800;color:#fff;
    box-shadow:0 0 16px rgba(63,185,80,0.3);letter-spacing:-0.5px;
  }
  .logo-text{font-family:'Syne',sans-serif;font-size:19px;font-weight:800;color:var(--text);}
  .logo-text span{color:var(--green2);}
  .nav{display:flex;gap:2px;}
  .nav a{
    padding:5px 13px;border-radius:6px;font-size:12px;text-decoration:none;
    color:var(--text-muted);border:1px solid transparent;transition:all 0.18s;
  }
  .nav a:hover{color:var(--text);background:var(--bg3);}
  .nav a.active{color:var(--green2);border-color:rgba(57,211,83,0.25);background:rgba(57,211,83,0.07);}
  .clock-badge{font-size:12px;color:var(--text-dim);background:var(--bg3);border:1px solid var(--border);padding:4px 10px;border-radius:6px;}

  /* Progress header */
  .progress-header{
    background:var(--bg2);border:1px solid var(--border);border-radius:12px;
    padding:16px 20px;margin-bottom:14px;
  }
  .ph-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
  .ph-label{font-size:10px;text-transform:uppercase;letter-spacing:1.8px;color:var(--text-muted);}
  .ph-pct{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;color:var(--green2);}
  .ph-sub{font-size:11px;color:var(--text-dim);margin-top:2px;}
  .ph-track{height:6px;background:var(--bg4);border-radius:3px;overflow:hidden;}
  .ph-fill{
    height:100%;border-radius:3px;
    background:linear-gradient(90deg,#1a7f37,var(--green2));
    transition:width 0.8s cubic-bezier(0.4,0,0.2,1);
    box-shadow:0 0 8px rgba(57,211,83,0.25);
  }

  /* Stats */
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px;}
  .stat-card{
    background:var(--bg2);border:1px solid var(--border);border-radius:10px;
    padding:14px 16px;position:relative;overflow:hidden;transition:border-color 0.2s,box-shadow 0.2s;
  }
  .stat-card:hover{border-color:#2d333b;box-shadow:0 4px 20px rgba(0,0,0,0.25);}
  .stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:10px 10px 0 0;}
  .sc-total::before{background:linear-gradient(90deg,var(--blue),transparent);}
  .sc-done::before {background:linear-gradient(90deg,var(--green2),transparent);}
  .sc-pend::before {background:linear-gradient(90deg,var(--yellow),transparent);}
  .sc-high::before {background:linear-gradient(90deg,var(--red),transparent);}
  .sc-tag{
    display:inline-block;font-size:9px;font-weight:700;font-family:'Syne',sans-serif;
    padding:2px 6px;border-radius:4px;margin-bottom:8px;letter-spacing:0.5px;
  }
  .sc-total .sc-tag{background:rgba(88,166,255,0.12);color:var(--blue);}
  .sc-done  .sc-tag{background:rgba(63,185,80,0.12);color:var(--green2);}
  .sc-pend  .sc-tag{background:rgba(227,179,65,0.12);color:var(--yellow);}
  .sc-high  .sc-tag{background:rgba(248,81,73,0.12);color:var(--red);}
  .sc-val{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;line-height:1;margin-bottom:3px;}
  .sc-lbl{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);}
  .sc-total .sc-val{color:var(--blue);}
  .sc-done  .sc-val{color:var(--green2);}
  .sc-pend  .sc-val{color:var(--yellow);}
  .sc-high  .sc-val{color:var(--red);}
  @media(max-width:600px){.stats{grid-template-columns:repeat(2,1fr);}}

  /* Add form */
  .add-form{
    background:var(--bg2);border:1px solid var(--border);border-radius:12px;
    padding:18px 20px;margin-bottom:14px;
  }
  .form-title{font-size:10px;text-transform:uppercase;letter-spacing:1.8px;color:var(--text-muted);margin-bottom:12px;}
  .form-row{display:flex;gap:8px;}
  .form-input{
    flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:8px;
    padding:10px 14px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:13px;
    outline:none;transition:border-color 0.2s,box-shadow 0.2s;
  }
  .form-input:focus{border-color:rgba(63,185,80,0.4);box-shadow:0 0 0 3px rgba(63,185,80,0.08);}
  .form-input::placeholder{color:var(--text-muted);}
  .form-select{
    background:var(--bg3);border:1px solid var(--border);border-radius:8px;
    padding:10px 12px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:12px;
    outline:none;cursor:pointer;min-width:110px;
  }
  .btn-add{
    background:linear-gradient(135deg,#2ea043,#3fb950);color:#fff;border:none;border-radius:8px;
    padding:10px 22px;font-family:'Syne',sans-serif;font-weight:700;font-size:13px;
    cursor:pointer;transition:all 0.2s;white-space:nowrap;
    box-shadow:0 0 16px rgba(63,185,80,0.18);
  }
  .btn-add:hover{box-shadow:0 0 22px rgba(63,185,80,0.32);transform:translateY(-1px);}
  .btn-add:active{transform:translateY(0);}
  .btn-add:disabled{opacity:0.4;cursor:not-allowed;transform:none;box-shadow:none;}
  @media(max-width:500px){.form-row{flex-direction:column;}}

  /* Search */
  .search-row{display:flex;gap:8px;margin-bottom:12px;}
  .search-input{
    flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:8px;
    padding:8px 12px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:12px;
    outline:none;transition:border-color 0.2s,box-shadow 0.2s;
  }
  .search-input:focus{border-color:rgba(88,166,255,0.4);box-shadow:0 0 0 3px rgba(88,166,255,0.08);}
  .search-input::placeholder{color:var(--text-muted);}
  .sort-select{
    background:var(--bg3);border:1px solid var(--border);border-radius:8px;
    padding:8px 10px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:11px;
    outline:none;cursor:pointer;min-width:130px;
  }

  /* Filters */
  .filters{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;}
  .filter-btn{
    padding:5px 14px;border-radius:20px;font-size:11px;cursor:pointer;
    border:1px solid var(--border);background:transparent;color:var(--text-muted);
    font-family:'JetBrains Mono',monospace;transition:all 0.18s;
  }
  .filter-btn.active{background:rgba(57,211,83,0.1);border-color:rgba(57,211,83,0.3);color:var(--green2);}
  .filter-btn:hover:not(.active){border-color:#2d333b;color:var(--text);}

  /* Task list */
  .task-list{display:flex;flex-direction:column;gap:6px;}
  .task-item{
    background:var(--bg2);border:1px solid var(--border);border-radius:10px;
    padding:13px 16px;display:flex;align-items:center;gap:12px;
    border-left:3px solid var(--border);
    transition:border-color 0.2s,box-shadow 0.2s,opacity 0.3s;
    animation:slideIn 0.18s ease;
  }
  @keyframes slideIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
  .task-item:hover{border-color:#2d333b;box-shadow:0 2px 12px rgba(0,0,0,0.2);}
  .task-item.done{opacity:0.4;}
  .task-item.done .task-title{text-decoration:line-through;color:var(--text-muted);}
  .task-item.pri-high  {border-left-color:var(--red);}
  .task-item.pri-medium{border-left-color:var(--yellow);}
  .task-item.pri-low   {border-left-color:var(--green2);}

  .task-check{
    width:20px;height:20px;border-radius:5px;border:2px solid var(--border);
    background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;
    flex-shrink:0;transition:all 0.18s;font-size:11px;font-weight:700;color:#fff;
  }
  .task-check:hover{border-color:var(--green2);}
  .task-check.checked{background:var(--green2);border-color:var(--green2);box-shadow:0 0 8px rgba(57,211,83,0.25);}

  .task-body{flex:1;min-width:0;}
  .task-title{font-size:13px;color:var(--text);margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.4;}
  .task-meta{font-size:10px;color:var(--text-muted);}

  .priority-badge{
    font-size:10px;padding:2px 9px;border-radius:20px;text-transform:uppercase;
    letter-spacing:0.5px;flex-shrink:0;border:1px solid transparent;font-weight:500;
  }
  .priority-high  {background:rgba(248,81,73,0.12); color:var(--red);   border-color:rgba(248,81,73,0.2);}
  .priority-medium{background:rgba(227,179,65,0.12);color:var(--yellow);border-color:rgba(227,179,65,0.2);}
  .priority-low   {background:rgba(63,185,80,0.12); color:var(--green2);border-color:rgba(63,185,80,0.2);}

  .btn-delete{
    background:transparent;border:1px solid transparent;border-radius:6px;
    color:var(--text-muted);cursor:pointer;padding:4px 8px;font-size:12px;
    transition:all 0.18s;flex-shrink:0;
  }
  .btn-delete:hover{color:var(--red);border-color:rgba(248,81,73,0.3);background:rgba(248,81,73,0.08);}

  .empty{text-align:center;padding:56px 24px;color:var(--text-muted);}
  .empty-line{width:32px;height:2px;background:var(--border);margin:0 auto 16px;}
  .empty-text{font-size:13px;color:var(--text-dim);margin-bottom:4px;}
  .empty-sub{font-size:11px;}

  footer{margin-top:28px;padding-top:16px;border-top:1px solid var(--border);display:flex;justify-content:space-between;font-size:11px;color:var(--text-muted);}
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="header-left">
      <a href="/" class="logo">
        <div class="logo-icon">DW</div>
        <div class="logo-text">Deploy<span>Watch</span></div>
      </a>
      <nav class="nav">
        <a href="/">Dashboard</a>
        <a href="/tasks" class="active">Task Manager</a>
      </nav>
    </div>
    <div class="clock-badge" id="clock">--:--:--</div>
  </header>

  <div class="progress-header">
    <div class="ph-row">
      <div>
        <div class="ph-label">Нийт ахиц</div>
        <div class="ph-sub" id="progress-sub">0 / 0 даалгавар дууссан</div>
      </div>
      <div class="ph-pct" id="progress-pct">0%</div>
    </div>
    <div class="ph-track"><div class="ph-fill" id="progress-fill" style="width:0%"></div></div>
  </div>

  <div class="stats">
    <div class="stat-card sc-total">
      <div class="sc-tag">НИЙТ</div>
      <div class="sc-val" id="stat-total">0</div>
      <div class="sc-lbl">Бүгд</div>
    </div>
    <div class="stat-card sc-done">
      <div class="sc-tag">DONE</div>
      <div class="sc-val" id="stat-done">0</div>
      <div class="sc-lbl">Дууссан</div>
    </div>
    <div class="stat-card sc-pend">
      <div class="sc-tag">TODO</div>
      <div class="sc-val" id="stat-pending">0</div>
      <div class="sc-lbl">Хүлээгдэж буй</div>
    </div>
    <div class="stat-card sc-high">
      <div class="sc-tag">HIGH</div>
      <div class="sc-val" id="stat-high">0</div>
      <div class="sc-lbl">Яаралтай</div>
    </div>
  </div>

  <div class="add-form">
    <div class="form-title">Шинэ даалгавар нэмэх</div>
    <div class="form-row">
      <input type="text" class="form-input" id="task-input"
        placeholder="Даалгаврын нэр оруулна уу..." maxlength="200">
      <select class="form-select" id="priority-select" title="Тэргүүлэх чиглэл">
        <option value="high">Яаралтай</option>
        <option value="medium" selected>Дунд</option>
        <option value="low">Бага</option>
      </select>
      <button type="button" class="btn-add" id="add-btn" onclick="addTask()">+ Нэмэх</button>
    </div>
  </div>

  <div class="search-row">
    <input type="search" class="search-input" id="search-input" placeholder="Хайх..." oninput="render()">
    <select class="sort-select" id="sort-select" onchange="render()" title="Эрэмбэлэх">
      <option value="date-desc">Шинэ эхэнд</option>
      <option value="date-asc">Хуучин эхэнд</option>
      <option value="priority">Тэргүүлэх чиглэл</option>
      <option value="alpha">Нэрээр</option>
    </select>
  </div>

  <div class="filters">
    <button type="button" class="filter-btn active" onclick="setFilter('all',this)">Бүгд &middot; <span id="count-all">0</span></button>
    <button type="button" class="filter-btn" onclick="setFilter('pending',this)">Хүлээгдэж буй &middot; <span id="count-pending">0</span></button>
    <button type="button" class="filter-btn" onclick="setFilter('done',this)">Дууссан &middot; <span id="count-done">0</span></button>
  </div>

  <div class="task-list" id="task-list">
    <div class="empty"><div class="empty-line"></div><div class="empty-text">Уншиж байна...</div></div>
  </div>

  <footer>
    <span>DeployWatch &middot; Task Manager &middot; Docker + Jenkins CI/CD</span>
    <span id="footer-time"></span>
  </footer>
</div>

<script>
  let tasks  = [];
  let filter = 'all';

  function tick() {
    const now = new Date();
    document.getElementById('clock').textContent = now.toLocaleTimeString('en-US',{hour12:false});
    document.getElementById('footer-time').textContent = now.toLocaleString('mn-MN');
  }
  setInterval(tick,1000); tick();

  async function loadTasks() {
    try {
      const r = await fetch('/api/tasks');
      tasks = await r.json();
    } catch(e) { tasks=[]; }
    render();
  }

  const PRIO_ORDER = { high: 0, medium: 1, low: 2 };

  function render() {
    const total   = tasks.length;
    const done    = tasks.filter(t=>t.done).length;
    const pending = tasks.filter(t=>!t.done).length;
    const high    = tasks.filter(t=>t.priority==='high'&&!t.done).length;
    const pct     = total ? Math.round(done/total*100) : 0;

    document.getElementById('stat-total').textContent    = total;
    document.getElementById('stat-done').textContent     = done;
    document.getElementById('stat-pending').textContent  = pending;
    document.getElementById('stat-high').textContent     = high;
    document.getElementById('count-all').textContent     = total;
    document.getElementById('count-pending').textContent = pending;
    document.getElementById('count-done').textContent    = done;
    document.getElementById('progress-pct').textContent  = pct+'%';
    document.getElementById('progress-sub').textContent  = `${done} / ${total} даалгавар дууссан`;
    document.getElementById('progress-fill').style.width = pct+'%';

    const query = (document.getElementById('search-input')?.value || '').toLowerCase().trim();
    const sort  = document.getElementById('sort-select')?.value || 'date-desc';

    let filtered =
      filter==='done'    ? tasks.filter(t=>t.done)  :
      filter==='pending' ? tasks.filter(t=>!t.done) : [...tasks];

    // Search filter
    if (query) filtered = filtered.filter(t => t.title.toLowerCase().includes(query));

    // Sort
    filtered.sort((a, b) => {
      if (sort === 'priority') return (PRIO_ORDER[a.priority]??1) - (PRIO_ORDER[b.priority]??1);
      if (sort === 'alpha')    return a.title.localeCompare(b.title);
      if (sort === 'date-asc') return new Date(a.createdAt) - new Date(b.createdAt);
      return new Date(b.createdAt) - new Date(a.createdAt); // date-desc default
    });

    const list = document.getElementById('task-list');
    if (!filtered.length) {
      const noMatchMsg = query ? `"${escHtml(query)}" — тохирох үр дүн байхгүй` : filter==='done'?'Дууссан даалгавар байхгүй':'Даалгавар байхгүй';
      list.innerHTML = `<div class="empty">
        <div class="empty-line"></div>
        <div class="empty-text">${noMatchMsg}</div>
        <div class="empty-sub">${filter==='all'&&!query?'Дээрх маягтаар шинэ даалгавар нэмнэ үү':''}</div>
      </div>`;
      return;
    }

    const pLabel = {high:'Яаралтай',medium:'Дунд',low:'Бага'};
    list.innerHTML = filtered.map(t=>`
      <div class="task-item pri-${t.priority}${t.done?' done':''}" id="task-${t.id}">
        <div class="task-check${t.done?' checked':''}" onclick="toggleTask(${t.id})">${t.done?'&#10003;':''}</div>
        <div class="task-body">
          <div class="task-title">${escHtml(t.title)}</div>
          <div class="task-meta">${timeAgo(t.createdAt)}</div>
        </div>
        <span class="priority-badge priority-${t.priority}">${pLabel[t.priority]||t.priority}</span>
        <button type="button" class="btn-delete" onclick="deleteTask(${t.id})" title="Устгах">&times;</button>
      </div>
    `).join('');
  }

  function timeAgo(d) {
    const diff = Math.floor((Date.now()-new Date(d))/1000);
    if(diff<60)    return diff+'с өмнө';
    if(diff<3600)  return Math.floor(diff/60)+'мин өмнө';
    if(diff<86400) return Math.floor(diff/3600)+'ц өмнө';
    return new Date(d).toLocaleDateString('mn-MN');
  }

  function setFilter(f,btn) {
    filter=f;
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  async function addTask() {
    const input = document.getElementById('task-input');
    const title = input.value.trim();
    if (!title) { input.focus(); return; }
    const priority = document.getElementById('priority-select').value;
    const btn = document.getElementById('add-btn');
    btn.disabled = true;
    try {
      const r = await fetch('/api/tasks',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({title,priority}),
      });
      if (r.ok) {
        const task = await r.json();
        tasks.push(task);
        input.value = '';
        render();
      }
    } finally { btn.disabled=false; input.focus(); }
  }

  async function toggleTask(id) {
    const task = tasks.find(t=>t.id===id);
    if (!task) return;
    const r = await fetch(`/api/tasks/${id}`,{
      method:'PUT',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({done:!task.done}),
    });
    if (r.ok) { task.done=!task.done; render(); }
  }

  async function deleteTask(id) {
    const r = await fetch(`/api/tasks/${id}`,{method:'DELETE'});
    if (r.ok) { tasks=tasks.filter(t=>t.id!==id); render(); }
  }

  function escHtml(s){
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  document.getElementById('task-input').addEventListener('keydown',e=>{
    if(e.key==='Enter') addTask();
  });

  loadTasks();
</script>
</body>
</html>
